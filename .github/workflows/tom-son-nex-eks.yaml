name: Tomcat-SonarQube-Nexus

on:
  workflow_dispatch:

jobs:

#=========================================
# BUILD STAGE
#=========================================
  Build-Stage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Application
        run: mvn clean package

      - name: Display Artifact
        run: ls -lrth target/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: maven-war
          path: target/*.war

#=========================================
# TEST STAGE
#=========================================
  Test-Stage:
    runs-on: ubuntu-latest
    needs: Build-Stage

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Execute Test Cases
        run: mvn test

      - name: Test Status
        run: echo "Tests Completed Successfully"

#=========================================
# SONARQUBE STAGE
#=========================================
  SonarQube:
    runs-on: ubuntu-latest
    needs: Test-Stage

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: SonarQube Analysis
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=maven-webapp \
            -Dsonar.host.url=http://43.204.142.248:9000 \
            -Dsonar.login=admin \
            -Dsonar.password=apple

#=========================================
# NEXUS STAGE
#=========================================
  Nexus:
    runs-on: ubuntu-latest
    needs: SonarQube

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configure Maven Settings
        run: |
          mkdir -p ~/.m2

          cat > ~/.m2/settings.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <settings>
            <servers>
              <server>
                <id>nexus</id>
                <username>admin</username>
                <password>apple</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Deploy Artifact to Nexus
        run: mvn clean deploy

#=========================================
# TOMCAT DEPLOYMENT
#=========================================
  Deploy-Stage:
    runs-on: ubuntu-latest
    needs: Nexus

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: maven-war
          path: target

      - name: Display Artifact
        run: ls -lrth target/

      - name: Deploy to Tomcat
        env:
          TOMCAT_URL: http://3.110.120.221:8080
          TOMCAT_USER: anil
          TOMCAT_PASS: password

        run: |
          WAR_FILE=$(find target -name "*.war" | head -1)

          curl -u "$TOMCAT_USER:$TOMCAT_PASS" \
            --upload-file "$WAR_FILE" \
            "$TOMCAT_URL/manager/text/deploy?path=/maven-web-application&update=true"

      - name: Deployment Status
        run: echo "Application Successfully Deployed to Tomcat"
