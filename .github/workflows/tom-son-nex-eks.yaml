name: Tomcat-SonarQube-Nexus

on:
  workflow_dispatch:

jobs:

#=========================================
# BUILD STAGE
#=========================================
  Build-Stage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Application
        run: mvn clean package

      - name: Display Artifact
        run: ls -lrth target/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: maven-war
          path: target/*.war

#=========================================
# TEST STAGE
#=========================================
  Test-Stage:
    runs-on: ubuntu-latest
    needs: Build-Stage

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Execute Test Cases
        run: mvn test

      - name: Test Status
        run: echo "Tests Completed Successfully"


            "$TOMCAT_URL/manager/text/deploy?path=/maven-web-application&update=true"

      - name: Deployment Status
        run: echo "Application Successfully Deployed to Tomcat"
