name: Tomcat-SonarQube-Nexus-EKS

on: workflow_dispatch

jobs:
  Build-Stage:
    runs-on: ubuntu-latest

    steps:
      - name: Check-out the code
        uses: actions/checkout@v4

      - name: Set-up the Java and Maven
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build the Application with Artifact
        run: mvn clean package

      - name: Display the files
        run: ls -lrth target/

      - name: Upload the Artifact
        uses: actions/upload-artifact@v4
        with:
          name: maven-war
          path: target

  Test-Stage:
    runs-on: ubuntu-latest
    needs: Build-Stage

    steps:
      - name: Check-out the code
        uses: actions/checkout@v4

      - name: Set-up the java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Test the Artifact
        run: mvn test

      - name: Status of Test Artifact
        run: echo "Successfully the test artifact is done"

  Deploy-Stage:
    runs-on: ubuntu-latest
    needs: Test-Stage

    steps:
      - name: Download the Artifact
        uses: actions/download-artifact@v4
        with:
          name: maven-war
          path: target

      - name: Display the donwload the Artifact
        run: ls -lrth target/

      - name: Deploy the Application
        env:
          TOMCAT_URL: http://3.110.120.221:8080
          TOMCAT_USER: anil
          TOMCAT_PASS: password

        run: |
          WAR_FILE=$(ls target/*.war | head -n 1)

          curl -u "$TOMCAT_USER:$TOMCAT_PASS" \
          --upload-file "$WAR_FILE" \
          "$TOMCAT_URL/manager/text/deploy?path=/maven-web-application&update=true"
          
      - name: Status of Deploy the Application
        run: |
          echo "Successfully deploy the Application done."










        
