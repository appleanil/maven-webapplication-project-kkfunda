name: Simple Build and Deploy
on:
  workflow_dispatch:

jobs:
  full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - run: mvn clean package

      - name: Deploy WAR to Tomcat
        env:
          TOMCAT_URL: ${{ vars.TOMCAT_URL }}
          TOMCAT_USERNAME: ${{ secrets.TOMCAT.USERNAME }}
          TOMCAT_PASSWORD: ${{ secrets.TOMCAT.PASSWORD }}
        run: |
          WAR=$(ls target/*.war | head -n 1)
          curl -sS -u "${TOMCAT_USERNAME}:${TOMCAT_PASSWORD}" --upload-file "$WAR" "${TOMCAT_URL}/manager/text/deploy?path=/maven-web-application&update=true"
